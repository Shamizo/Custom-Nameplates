name: Build

on:
  push:
  pull_request:

jobs:
  releaseJar:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # 升级到 v4
        with:
          fetch-depth: 0                  # 获取完整历史（供 git describe 等使用）
          fetch-tags: true                # 同时获取标签

      - name: Set up JDK 17
        uses: actions/setup-java@v4       # 建议固定版本，也可以继续用 @main
        with:
          java-version: 17
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Compress All Files
        run: tar -cvf project.tar ./*

      - name: Upload to CI Release (pre-release)
        if: github.event_name != 'pull_request'
        uses: marvinpinto/action-automatic-releases@master
        with:
          title: "CI"
          automatic_release_tag: "ci"
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          files: "build/libs/*.jar"
          prerelease: true

      - name: Upload build artifacts (for workflow summary)
        uses: actions/upload-artifact@v4   # ✅ 升级到 v4
        with:
          name: Artifacts
          path: |
            build/libs/
            project.tar

      - name: Publish Latest Release
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "CI"
          files: |
            paper/build/libs/*.*
            velocity/build/libs/*.*
            project.tar
